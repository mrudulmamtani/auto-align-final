<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoAlign — Document Formatter</title>

  <!-- Office.js — MUST load before any Office API calls -->
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

  <link rel="stylesheet" href="addin.css" />
</head>
<body>

  <!-- ── Header ──────────────────────────────────────────────────────────── -->
  <div id="aa-header">
    <div class="aa-brand">AutoAlign</div>
    <div class="aa-tagline">Governance Document Formatter</div>
  </div>

  <!-- ── Document info strip ─────────────────────────────────────────────── -->
  <div id="aa-doc-info">
    <span id="doc-type-badge" class="doc-badge unknown">Doc</span>
    <span id="doc-title-text" class="doc-title">Detecting document…</span>
  </div>

  <!-- ── Progress ─────────────────────────────────────────────────────────── -->
  <div id="aa-progress-wrap">
    <div id="aa-progress-bar"><div id="aa-progress-fill"></div></div>
    <div id="aa-progress-label">Formatting…</div>
  </div>

  <!-- ── Primary actions ──────────────────────────────────────────────────── -->
  <div class="aa-section">
    <div class="aa-section-title">Format Document</div>

    <button class="aa-btn primary" id="btn-full-format" disabled>
      <span class="btn-icon">✦</span>
      <span class="btn-content">
        <span class="btn-label">Apply Full Consultant Format</span>
        <span class="btn-desc">Heading styles · body typography · margins · header/footer</span>
      </span>
    </button>

    <button class="aa-btn" id="btn-cover-page" disabled>
      <span class="btn-icon">📄</span>
      <span class="btn-content">
        <span class="btn-label">Insert Cover Page</span>
        <span class="btn-desc">Professional cover with org branding &amp; metadata table</span>
      </span>
    </button>

    <button class="aa-btn" id="btn-toc" disabled>
      <span class="btn-icon">📑</span>
      <span class="btn-content">
        <span class="btn-label">Insert / Refresh Table of Contents</span>
        <span class="btn-desc">Styled TOC with dot leaders and page numbers</span>
      </span>
    </button>

  </div>

  <!-- ── Diagram actions ──────────────────────────────────────────────────── -->
  <div class="aa-section">
    <div class="aa-section-title">Diagrams &amp; Tables</div>

    <button class="aa-btn" id="btn-format-diagrams" disabled>
      <span class="btn-icon">🖼</span>
      <span class="btn-content">
        <span class="btn-label">Format All Diagrams</span>
        <span class="btn-desc">Resize to 6" · centre-align · add "Figure N:" captions</span>
      </span>
    </button>

    <button class="aa-btn" id="btn-format-tables" disabled>
      <span class="btn-icon">⊞</span>
      <span class="btn-content">
        <span class="btn-label">Format All Tables</span>
        <span class="btn-desc">Navy header row · alternating row colours · auto-fit</span>
      </span>
    </button>

    <button class="aa-btn" id="btn-format-trace" disabled>
      <span class="btn-icon">🔗</span>
      <span class="btn-content">
        <span class="btn-label">Style Traceability Annex</span>
        <span class="btn-desc">Colour-code normative vs informative rows</span>
      </span>
    </button>

  </div>

  <!-- ── Document structure actions ───────────────────────────────────────── -->
  <div class="aa-section">
    <div class="aa-section-title">Page Setup</div>

    <button class="aa-btn" id="btn-page-setup" disabled>
      <span class="btn-icon">📐</span>
      <span class="btn-content">
        <span class="btn-label">Apply Page Setup</span>
        <span class="btn-desc">A4 · margins 1.25" left/right · header &amp; footer</span>
      </span>
    </button>

    <button class="aa-btn" id="btn-hdr-ftr" disabled>
      <span class="btn-icon">↕</span>
      <span class="btn-content">
        <span class="btn-label">Insert Header &amp; Footer</span>
        <span class="btn-desc">Doc ID · org name · page X of Y · confidentiality</span>
      </span>
    </button>

  </div>

  <!-- ── Status log ────────────────────────────────────────────────────────── -->
  <div class="aa-section" style="border-bottom:none; padding-bottom:0;">
    <div class="aa-section-title">Activity Log</div>
  </div>
  <div id="aa-log">
    <div class="log-entry info">
      <span class="log-icon">ℹ</span>
      <span class="log-text">Loading Office.js… open a document generated by AutoAlign.</span>
    </div>
  </div>

  <!-- ── Settings ─────────────────────────────────────────────────────────── -->
  <div id="aa-settings" class="aa-section">
    <div class="aa-section-title">Settings</div>
    <div class="aa-input-row">
      <label class="aa-label" for="input-api-url">Backend API URL</label>
      <input id="input-api-url" class="aa-input" type="text" value="http://localhost:8100" />
    </div>
    <div class="aa-input-row">
      <label class="aa-label" for="input-org">Organisation Name</label>
      <input id="input-org" class="aa-input" type="text" placeholder="e.g. Acme Corporation" />
    </div>
    <button class="aa-btn" id="btn-save-settings" style="margin-top:4px">
      <span class="btn-icon">💾</span>
      <span class="btn-label">Save Settings</span>
    </button>
  </div>

  <!-- ── Footer ────────────────────────────────────────────────────────────── -->
  <div id="aa-footer">
    <span>AutoAlign v1.0</span>
    <a class="aa-footer-link" id="link-settings">⚙ Settings</a>
  </div>

  <!-- ── Global spinner overlay ───────────────────────────────────────────── -->
  <div id="aa-global-spinner">
    <div class="aa-spinner"></div>
    <div id="spinner-text">Applying formatting…</div>
  </div>

  <script src="taskpane.js"></script>
</body>
</html>
